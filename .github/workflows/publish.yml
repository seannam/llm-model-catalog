name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; pin latest.
      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a
      # short-lived publish credential after Trusted Publisher is
      # configured on the package's npm settings page.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
